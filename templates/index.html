<!DOCTYPE html>
<html>
<head>
    <title>Student Score Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        h2 {
            text-align: center;
            color: #4a4a8a;
            font-size: 24px;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #999;
            font-size: 13px;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        select, input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e8e8e8;
            border-radius: 10px;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: border 0.2s;
        }
        select:focus, input:focus {
            border-color: #667eea;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .result {
            margin-top: 24px;
            padding: 20px;
            background: linear-gradient(135deg, #f0f4ff, #e8f0fe);
            border-radius: 12px;
            text-align: center;
            border-left: 4px solid #667eea;
        }
        .result h3 {
            color: #4a4a8a;
            font-size: 18px;
        }
        .result .score {
            font-size: 48px;
            font-weight: 700;
            color: #667eea;
            margin: 8px 0;
        }
        .result p { color: #888; font-size: 13px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎓 Student Score Predictor</h2>
        <p class="subtitle">Predict math score based on student profile</p>

        <form action="/predict" method="POST">
            <div class="form-group">
                <label>Gender</label>
                <select name="gender">
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Race / Ethnicity</label>
                <select name="race">
                    <option value="0">Group A</option>
                    <option value="1">Group B</option>
                    <option value="2">Group C</option>
                    <option value="3">Group D</option>
                    <option value="4">Group E</option>
                </select>
            </div>

            <div class="form-group">
                <label>Parental Level of Education</label>
                <select name="parent_edu">
                    <option value="0">Some High School</option>
                    <option value="1">High School</option>
                    <option value="2">Some College</option>
                    <option value="3">Associate's Degree</option>
                    <option value="4">Bachelor's Degree</option>
                    <option value="5">Master's Degree</option>
                </select>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Lunch</label>
                    <select name="lunch">
                        <option value="1">Standard</option>
                        <option value="0">Free / Reduced</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Test Prep Course</label>
                    <select name="test_prep">
                        <option value="0">None</option>
                        <option value="1">Completed</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="form-group">
                    <label>Reading Score</label>
                    <input type="number" name="reading_score" min="0" max="100" placeholder="0 - 100">
                </div>
                <div class="form-group">
                    <label>Writing Score</label>
                    <input type="number" name="writing_score" min="0" max="100" placeholder="0 - 100">
                </div>
            </div>

            <button type="submit">Predict Math Score →</button>
        </form>

        {% if prediction %}
        <div class="result">
            <h3>Predicted Math Score</h3>
            <div class="score">{{ prediction }}</div>
            <p>out of 100</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
